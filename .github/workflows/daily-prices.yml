name: Daily Sync (Prices + Capabilities)

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  update-prices:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Sync capabilities from OpenRouter
        run: python scripts/sync_capabilities.py

      - name: Fetch OpenRouter prices
        id: fetch
        run: python scripts/fetch_openrouter_prices.py
        continue-on-error: true

      - name: Regenerate portal from data
        run: python scripts/generate_portal.py

      - name: Validate data integrity
        run: python scripts/validate.py

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet data/ index.html llms-full.txt; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit updates
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/pricing.json data/models.json data/new_models_detected.json index.html llms-full.txt 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: daily sync $(date -u +%Y-%m-%d)"
          git push

      - name: Create issue for new models (dedup)
        if: steps.fetch.outcome == 'failure' && hashFiles('data/new_models_detected.json') != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const detected = JSON.parse(fs.readFileSync('data/new_models_detected.json', 'utf8'));
            const models = detected.models.slice(0, 20);
            const list = models.map(m => `- \`${m.openrouter_id}\` — $${m.pricing.input}/M in, $${m.pricing.output}/M out`).join('\n');
            const more = detected.models.length > 20 ? `\n... and ${detected.models.length - 20} more` : '';

            // Dedup: check for existing open issue with same title prefix
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'new-models',
              per_page: 5,
            });
            if (existing.length > 0) {
              console.log(`Skipping: ${existing.length} open new-models issue(s) already exist`);
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `New models on OpenRouter (${detected.detected})`,
              labels: ['new-models'],
              body: `The daily price update script detected ${detected.models.length} new model(s) on OpenRouter not currently tracked in \`data/models.json\`.\n\nAdd them manually with pricing, tier, and any available scores.\n\n## New models\n${list}${more}\n\n## Details\nFull list: \`data/new_models_detected.json\``
            });
